<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MikMon Dashboard PRO - LINK.NET</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--surface:#242d3f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8ecf4;--text2:#8b95a8;--text3:#5a6478;
  --accent:#3b82f6;--accent2:#60a5fa;
  --green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:sans-serif;line-height:1.5;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:20px}
header{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;border-bottom:1px solid var(--border)}
.logo{font-size:18px;font-weight:bold}
.logo span{background:var(--accent);padding:2px 6px;border-radius:4px;font-size:12px;margin-left:5px}
.nav{display:flex;gap:5px;background:var(--bg2);padding:5px;border-radius:var(--r)}
.nav button{background:transparent;border:none;color:var(--text2);padding:8px 15px;border-radius:var(--rs);cursor:pointer;transition:0.2s}
.nav button.active{background:var(--surface);color:white}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:15px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px}
.card h3{font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
.card .val{font-size:20px;font-weight:bold}
.hidden{display:none}
.btn{background:var(--accent);color:white;border:none;padding:10px 15px;border-radius:var(--rs);cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:8px}
.btn-print{background:var(--purple)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;margin-top:10px}
th{text-align:left;padding:10px;background:var(--bg3);font-size:12px}
td{padding:10px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
.status-msg{font-size:11px;color:var(--accent2);margin-top:5px}

/* Rekap Styles */
.year-block{margin-bottom:15px;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.year-header{background:var(--bg3);padding:10px;font-weight:bold;display:flex;justify-content:space-between;align-items:center}
.month-row{border-top:1px solid var(--border)}
.month-btn{width:100%;text-align:left;background:none;border:none;padding:12px;color:white;cursor:pointer;display:flex;justify-content:space-between}
.month-content{display:none;padding:15px;background:var(--bg);border-top:1px solid var(--border)}
.month-row.open .month-content{display:block}

@media print {
    body { background: white; color: black; }
    .nav, #btn-sync, .btn-print, header, .status-msg, #tab-debug { display: none !important; }
    .app { padding: 0; max-width: 100%; }
    .panel, .card, .year-block { border: 1px solid #ddd !important; background: white !important; color: black !important; }
    .month-content { display: block !important; }
    .card h3, td, th { color: black !important; }
    .hidden { display: none !important; }
    #tab-rekap.hidden { display: block !important; }
}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">LINK.NET <span>PRO</span></div>
    <div class="nav">
      <button id="n-dash" class="active" onclick="switchTab('dash')">Dashboard</button>
      <button id="n-rekap" onclick="switchTab('rekap')">Rekap</button>
      <button id="n-data" onclick="switchTab('data')">Data</button>
      <button id="n-debug" onclick="switchTab('debug')">Status</button>
    </div>
  </header>

  <div id="status-area" class="status-msg">Inisialisasi sistem...</div>

  <!-- DASHBOARD -->
  <div id="tab-dash">
    <div class="card-grid">
      <div class="card"><h3>Total Revenue</h3><div class="val" id="v-rev">Rp 0</div></div>
      <div class="card"><h3>Komisi Seller</h3><div class="val" id="v-sell" style="color:var(--green)">Rp 0</div></div>
      <div class="card"><h3>Komisi Staff</h3><div class="val" id="v-staff" style="color:var(--purple)">Rp 0</div></div>
      <div class="card"><h3>Net Profit</h3><div class="val" id="v-net" style="color:var(--accent2)">Rp 0</div></div>
    </div>
    <div class="panel" style="margin-top:20px">
      <div style="display:flex; gap:10px; margin-bottom:20px">
        <button class="btn" id="btn-sync" onclick="syncData()">🔄 Sinkron GitHub</button>
        <button class="btn btn-print" onclick="window.print()">🖨️ Cetak Laporan</button>
      </div>
      <div style="height:300px;"><canvas id="mainChart"></canvas></div>
    </div>
  </div>

  <!-- REKAP -->
  <div id="tab-rekap" class="hidden">
    <div class="panel">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
        <h2>💰 Rekap Komisi Bulanan</h2>
        <button class="btn btn-print btn-sm" onclick="window.print()">Cetak Rekap</button>
      </div>
      <div id="rekap-list">Memuat rekap...</div>
    </div>
  </div>

  <!-- DATA -->
  <div id="tab-data" class="hidden">
    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Tanggal</th><th>Item</th><th>Seller</th><th>Harga</th><th>Kom. Seller</th></tr></thead>
          <tbody id="data-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- DEBUG -->
  <div id="tab-debug" class="hidden">
    <div class="panel">
      <h3>Informasi Sistem</h3>
      <p>Folder GitHub: <code style="color:var(--amber)">DATA MASTER/</code></p>
      <div id="debug-log" style="margin-top:15px; font-family:monospace; font-size:12px; color:var(--text3)"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const fbConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
const appId = typeof __app_id !== 'undefined' ? __app_id : 'linknet-app';

window.appState = {
    user: null,
    commissions: {},
    reports: [],
    chart: null
};

window.switchTab = (tab) => {
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
    document.getElementById('tab-' + tab).classList.remove('hidden');
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('n-' + tab).classList.add('active');
};

if (fbConfig) {
    const app = initializeApp(fbConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (err) { console.error(err); }
    };
    initAuth();

    onAuthStateChanged(auth, (user) => {
        window.appState.user = user;
        if (user) {
            document.getElementById('status-area').innerText = "Cloud Sync Active";
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'states', 'main_state');
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    window.appState.commissions = d.commissions || {};
                    window.appState.reports = d.reports || [];
                    renderUI();
                }
            });
        }
    });

    window.saveState = async () => {
        if (!window.appState.user) return;
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'states', 'main_state');
        await setDoc(docRef, {
            commissions: window.appState.commissions,
            reports: window.appState.reports,
            ts: Date.now()
        });
    };
}

window.syncData = async () => {
    const btn = document.getElementById('btn-sync');
    const status = document.getElementById('status-area');
    const debug = document.getElementById('debug-log');
    btn.disabled = true;
    status.innerText = "Mengambil data GitHub...";

    try {
        const user = 'bam-source', repo = 'linknet', folder = 'DATA MASTER';
        const url = `https://api.github.com/repos/${user}/${repo}/contents/${encodeURIComponent(folder)}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("Gagal akses folder GitHub.");
        
        const files = await res.json();
        const excels = files.filter(f => f.name.endsWith('.xlsx'));

        // 1. MASTER DATA (Komisi)
        const masterFile = excels.find(f => f.name.includes('MASTER_DATA'));
        if (masterFile) {
            const mRes = await fetch(masterFile.download_url);
            const mab = await mRes.arrayBuffer();
            const mwb = XLSX.read(new Uint8Array(mab), {type:'array'});
            const mData = XLSX.utils.sheet_to_json(mwb.Sheets[mwb.SheetNames[0]]);
            const newComms = {};
            mData.forEach(r => {
                const s = String(r.Seller || '').trim();
                const p = String(r.Package || '').trim();
                if(s && p) {
                    if(!newComms[s]) newComms[s] = {};
                    newComms[s][p] = { seller: parseFloat(r.KomisiSeller || 0), staff: parseFloat(r.KomisiStaff || 0) };
                }
            });
            window.appState.commissions = newComms;
        }

        // 2. LAPORAN TRANSAKSI
        const reportList = [];
        for (const f of excels) {
            if (f.name.includes('MASTER_DATA')) continue;
            const rRes = await fetch(f.download_url);
            const rab = await rRes.arrayBuffer();
            const rwb = XLSX.read(new Uint8Array(rab), {type:'array'});
            const rData = XLSX.utils.sheet_to_json(rwb.Sheets[rwb.SheetNames[0]]);
            
            const rows = rData.map(r => {
                let d = r.Date || r.Tanggal;
                let dt = new Date();
                if (typeof d === 'number') dt = new Date((d - 25569) * 86400 * 1000);
                else if (d) dt = new Date(d);

                const prof = String(r.Profile || r.Paket || '');
                const pkg = prof.split('-')[0].trim();
                const seller = prof.split('-')[1]?.trim() || 'Admin';

                return {
                    date: dt.toLocaleDateString('id-ID'),
                    year: dt.getFullYear(),
                    month: dt.getMonth(),
                    pkg,
                    seller,
                    price: parseFloat(r.Price || r.Harga || 0)
                };
            });
            reportList.push({ name: f.name, data: rows });
        }

        window.appState.reports = reportList;
        if (window.saveState) await window.saveState();
        renderUI();
        status.innerText = "Berhasil Sinkron!";
    } catch (e) {
        status.innerText = "Error: " + e.message;
    } finally { btn.disabled = false; }
};

function renderUI() {
    const all = window.appState.reports.flatMap(r => r.data);
    let rev = 0, sCom = 0, stCom = 0, net = 0;
    const tree = {};

    const tableRows = all.map(r => {
        rev += r.price;
        const cfg = (window.appState.commissions[r.seller] && window.appState.commissions[r.seller][r.pkg]) 
                    ? window.appState.commissions[r.seller][r.pkg] : {seller:0, staff:0};
        
        sCom += cfg.seller;
        stCom += cfg.staff;
        net += (r.price - cfg.staff);

        if(!tree[r.year]) tree[r.year] = {};
        if(!tree[r.year][r.month]) tree[r.year][r.month] = { net: 0, sTotal:0, stTotal:0, sellers: {} };
        
        const m = tree[r.year][r.month];
        m.net += (r.price - cfg.staff);
        m.sTotal += cfg.seller;
        m.stTotal += cfg.staff;

        if(!m.sellers[r.seller]) m.sellers[r.seller] = { s:0, st:0, qty:0 };
        m.sellers[r.seller].s += cfg.seller;
        m.sellers[r.seller].st += cfg.staff;
        m.sellers[r.seller].qty++;

        return `<tr><td>${r.date}</td><td>${r.pkg}</td><td>${r.seller}</td><td>${f(r.price)}</td><td>${f(cfg.seller)}</td></tr>`;
    });

    const f = (n) => "Rp " + Math.round(n).toLocaleString('id-ID');
    document.getElementById('v-rev').innerText = f(rev);
    document.getElementById('v-sell').innerText = f(sCom);
    document.getElementById('v-staff').innerText = f(stCom);
    document.getElementById('v-net').innerText = f(net);
    document.getElementById('data-body').innerHTML = tableRows.slice(0, 100).join('');

    // Render Rekap
    const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    let html = "";
    Object.keys(tree).sort((a,b)=>b-a).forEach(y => {
        html += `<div class="year-block"><div class="year-header">TAHUN ${y}</div>`;
        Object.keys(tree[y]).sort((a,b)=>b-a).forEach(m => {
            const data = tree[y][m];
            html += `
                <div class="month-row">
                    <button class="month-btn" onclick="this.parentElement.classList.toggle('open')">
                        <span>${months[m]}</span>
                        <span>Net Profit: <b>${f(data.net)}</b> ▾</span>
                    </button>
                    <div class="month-content">
                        <div style="margin-bottom:10px; font-size:12px; color:var(--text3)">
                            Total Komisi Penjual: ${f(data.sTotal)} | Beban Staff: ${f(data.stTotal)}
                        </div>
                        <table>
                            <thead><tr><th>Nama Seller</th><th>Qty</th><th>Komisi Seller</th><th>Potongan Staff</th></tr></thead>
                            <tbody>
                                ${Object.keys(data.sellers).map(sn => `
                                    <tr><td>${sn}</td><td>${data.sellers[sn].qty}</td><td>${f(data.sellers[sn].s)}</td><td>${f(data.sellers[sn].st)}</td></tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
    });
    document.getElementById('rekap-list').innerHTML = html || "Belum ada data.";
    updateChart(all);
}

function updateChart(data) {
    const ctx = document.getElementById('mainChart');
    if (!ctx) return;
    if (window.appState.chart) window.appState.chart.destroy();
    const groups = {};
    data.slice(-15).forEach(r => {
        groups[r.date] = (groups[r.date] || 0) + r.price;
    });
    window.appState.chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Object.keys(groups),
            datasets: [{ label: 'Omzet', data: Object.values(groups), borderColor: '#3b82f6', tension: 0.3 }]
        },
        options: { maintainAspectRatio: false }
    });
}
</script>
</body>
</html>
